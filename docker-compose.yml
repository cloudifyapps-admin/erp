version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp_db
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erp-internal

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - erp-internal

  # ─── MinIO (S3-compatible) ────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - erp-internal

  # ─── Keycloak (IAM) ──────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/erp_db
      KC_DB_USERNAME: erp_user
      KC_DB_PASSWORD: erp_password
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-internal

  # ─── MailHog (Email Testing) ─────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # Web UI
    networks:
      - erp-internal

  # ─── FastAPI Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://erp_user:erp_password@postgres:5432/erp_db
      DATABASE_URL_SYNC: postgresql://erp_user:erp_password@postgres:5432/erp_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      SECRET_KEY: cloudifyapps-erp-secret-change-in-production-${RANDOM}
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      DEBUG: "true"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_TLS: "false"
      EMAIL_FROM_ADDRESS: noreply@cloudifyapps.com
      EMAIL_FROM_NAME: Cloudifyapps ERP
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - erp-internal
    restart: unless-stopped

  # ─── Next.js Frontend ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_APP_NAME: Cloudifyapps ERP
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - erp-internal
    restart: unless-stopped

  # ─── Celery Worker ───────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://erp_user:erp_password@postgres:5432/erp_db
      DATABASE_URL_SYNC: postgresql://erp_user:erp_password@postgres:5432/erp_db
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_TLS: "false"
      EMAIL_FROM_ADDRESS: noreply@cloudifyapps.com
      EMAIL_FROM_NAME: Cloudifyapps ERP
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    networks:
      - erp-internal
    restart: unless-stopped

  # ─── Celery Beat (Scheduler) ─────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://erp_user:erp_password@postgres:5432/erp_db
      DATABASE_URL_SYNC: postgresql://erp_user:erp_password@postgres:5432/erp_db
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_TLS: "false"
      EMAIL_FROM_ADDRESS: noreply@cloudifyapps.com
      EMAIL_FROM_NAME: Cloudifyapps ERP
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    networks:
      - erp-internal
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_uploads:

networks:
  erp-internal:
    driver: bridge
